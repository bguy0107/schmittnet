services:
  caddy:
    image: caddy:2-alpine
    env_file:
      - ../.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

  migrate:
    image: ghcr.io/${GITHUB_REPOSITORY:-schmittnet/schmittnet}:${IMAGE_TAG:-latest}
    command: ["node_modules/.bin/prisma", "migrate", "deploy", "--schema=apps/web/prisma/schema.prisma"]
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-schmittnet/schmittnet}:${IMAGE_TAG:-latest}
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-schmittnet/schmittnet}:${IMAGE_TAG:-latest}
    command: ["node", "dist/worker.js"]
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - ../.env
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  minio_data:
