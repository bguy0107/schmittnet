name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, staging]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/schmittnet

            # Pull the new image (tagged by commit SHA for rollback safety)
            IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
            export IMAGE_TAG

            docker compose pull web worker
            docker compose up -d web worker

            # Run pending migrations (expand/contract pattern — safe in either order)
            docker compose exec -T web npx prisma migrate deploy

            # Verify the health endpoint responds
            sleep 5
            curl -fsS http://localhost:3000/api/health || (echo "Health check failed" && exit 1)

            echo "Deploy complete: $IMAGE_TAG"
